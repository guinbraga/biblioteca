<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alunos - Sistema de Biblioteca Genérico</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="/index.html">Sistema de Biblioteca Genérico</a>
        <div>
            <a class="text-light text-decoration-none me-3" href="/livros.html">Livros</a>
            <a class="text-light text-decoration-none" href="/alunos.html">Alunos</a>
        </div>
    </div>
</nav>

<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 class="h4 mb-0">Alunos</h2>
        <button class="btn btn-primary" onclick="abrirNovo()">+ Novo aluno</button>
    </div>

    <div id="alerta"></div>

    <div class="card">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                <tr><th>RA</th><th>Nome</th><th class="text-end">Ações</th></tr>
                </thead>
                <tbody id="tabela"></tbody>
            </table>
        </div>
    </div>
</div>

<div class="modal fade" id="modalAluno" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="form-titulo">Novo aluno</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="aluno-id">
                <div class="row g-3">
                    <div class="col-md-4">
                        <label class="form-label">RA</label>
                        <input type="text" class="form-control" id="ra">
                    </div>
                    <div class="col-md-8">
                        <label class="form-label">Nome</label>
                        <input type="text" class="form-control" id="nome">
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                <button type="button" class="btn btn-primary" onclick="salvar()">Salvar</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const API = '/api/alunos';
    const COLUNAS = 3;
    let cache = [];
    let modal;

    document.addEventListener('DOMContentLoaded', () => {
        modal = new bootstrap.Modal(document.getElementById('modalAluno'));
        carregar();
    });

    function linhaUnica(conteudo) {
        return '<tr><td colspan="' + COLUNAS + '" class="text-center py-4">' + conteudo + '</td></tr>';
    }

    async function carregar() {
        const tbody = document.getElementById('tabela');
        tbody.innerHTML = linhaUnica(
            '<div class="spinner-border text-secondary" role="status"></div>' +
            '<div class="text-muted mt-2">Carregando...</div>');

        try {
            const resp = await fetch(API);
            cache = await resp.json();
        } catch (e) {
            tbody.innerHTML = linhaUnica('<span class="text-danger">Falha ao carregar os dados.</span>');
            return;
        }

        tbody.innerHTML = '';
        if (cache.length === 0) {
            tbody.innerHTML = linhaUnica('<span class="text-muted">Nenhum aluno cadastrado.</span>');
            return;
        }
        for (const a of cache) {
            const tr = document.createElement('tr');
            tr.innerHTML =
                '<td>' + (a.RA || '') + '</td>' +
                '<td>' + (a.nome || '') + '</td>' +
                '<td class="text-end">' +
                '  <button class="btn btn-sm btn-outline-secondary" onclick="editar(' + a.id + ')">Editar</button> ' +
                '  <button class="btn btn-sm btn-outline-danger" onclick="excluir(' + a.id + ')">Excluir</button>' +
                '</td>';
            tbody.appendChild(tr);
        }
    }

    function abrirNovo() {
        limparForm();
        document.getElementById('form-titulo').textContent = 'Novo aluno';
        modal.show();
    }

    function editar(id) {
        const a = cache.find(x => x.id === id);
        if (!a) return;
        document.getElementById('aluno-id').value = a.id;
        document.getElementById('ra').value = a.RA || '';
        document.getElementById('nome').value = a.nome || '';
        document.getElementById('form-titulo').textContent = 'Editar aluno';
        modal.show();
    }

    function limparForm() {
        document.getElementById('aluno-id').value = '';
        document.getElementById('ra').value = '';
        document.getElementById('nome').value = '';
    }

    async function salvar() {
        const id = document.getElementById('aluno-id').value;
        const aluno = {
            RA: document.getElementById('ra').value,
            nome: document.getElementById('nome').value
        };

        const url = id ? API + '/' + id : API;
        const metodo = id ? 'PUT' : 'POST';

        const resp = await fetch(url, {
            method: metodo,
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(aluno)
        });

        if (resp.ok) {
            modal.hide();
            mostrarAlerta('Aluno salvo com sucesso.', 'success');
            carregar();
        } else {
            mostrarAlerta(await extrairErro(resp), 'danger');
        }
    }

    async function excluir(id) {
        if (!confirm('Remover este aluno?')) return;
        const resp = await fetch(API + '/' + id, { method: 'DELETE' });
        if (resp.ok) {
            mostrarAlerta('Aluno removido.', 'success');
            carregar();
        } else {
            mostrarAlerta(await extrairErro(resp), 'danger');
        }
    }

    async function extrairErro(resp) {
        let msg = 'Não foi possível concluir a operação (status ' + resp.status + ').';
        try {
            const texto = await resp.text();
            if (texto) {
                try {
                    const json = JSON.parse(texto);
                    msg = json.message || json.error || texto;
                } catch (e) {
                    msg = texto;
                }
            }
        } catch (e) { /* mantém a mensagem padrão */ }
        return msg;
    }

    function mostrarAlerta(msg, tipo) {
        document.getElementById('alerta').innerHTML =
            '<div class="alert alert-' + tipo + ' alert-dismissible fade show" role="alert">' +
            msg +
            '<button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Fechar"></button>' +
            '</div>';
        setTimeout(() => {
            const el = document.querySelector('#alerta .alert');
            if (el) bootstrap.Alert.getOrCreateInstance(el).close();
        }, 5000);
    }
</script>
</body>
</html>
