<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Livros - Sistema de Biblioteca Genérico</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="/index.html">Sistema de Biblioteca Genérico</a>
        <div>
            <a class="text-light text-decoration-none me-3" href="/livros.html">Livros</a>
            <a class="text-light text-decoration-none" href="/alunos.html">Alunos</a>
        </div>
    </div>
</nav>

<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 class="h4 mb-0">Livros</h2>
        <button class="btn btn-primary" onclick="abrirNovo()">+ Novo livro</button>
    </div>

    <div id="alerta"></div>

    <div class="card">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                <tr>
                    <th>Código</th><th>Título</th><th>Autor</th>
                    <th>Área</th><th>Restrito?</th><th class="text-end">Ações</th>
                </tr>
                </thead>
                <tbody id="tabela"></tbody>
            </table>
        </div>
    </div>
</div>

<div class="modal fade" id="modalLivro" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="form-titulo">Novo livro</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="livro-id">
                <div class="row g-3">
                    <div class="col-md-3">
                        <label class="form-label">Código</label>
                        <input type="number" class="form-control" id="codigo">
                    </div>
                    <div class="col-md-9">
                        <label class="form-label">Título</label>
                        <input type="text" class="form-control" id="tituloNome">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Autor</label>
                        <input type="text" class="form-control" id="autor">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Área</label>
                        <input type="text" class="form-control" id="area">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Prazo (dias)</label>
                        <input type="number" class="form-control" id="prazo">
                    </div>
                    <div class="col-12">
                        <div class="form-check">
                            <input type="checkbox" class="form-check-input" id="exemplarBiblioteca">
                            <label class="form-check-label" for="exemplarBiblioteca">
                                Exemplar restrito à biblioteca (não pode ser emprestado)
                            </label>
                        </div>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                <button type="button" class="btn btn-primary" onclick="salvar()">Salvar</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const API = '/api/livros';
    const COLUNAS = 6; 
    let cache = [];
    let modal;

    document.addEventListener('DOMContentLoaded', () => {
        modal = new bootstrap.Modal(document.getElementById('modalLivro'));
        carregar();
    });

    function linhaUnica(conteudo) {
        return '<tr><td colspan="' + COLUNAS + '" class="text-center py-4">' + conteudo + '</td></tr>';
    }

    async function carregar() {
        const tbody = document.getElementById('tabela');
        tbody.innerHTML = linhaUnica(
            '<div class="spinner-border text-secondary" role="status"></div>' +
            '<div class="text-muted mt-2">Carregando...</div>');

        try {
            const resp = await fetch(API);
            cache = await resp.json();
        } catch (e) {
            tbody.innerHTML = linhaUnica('<span class="text-danger">Falha ao carregar os dados.</span>');
            return;
        }

        tbody.innerHTML = '';
        if (cache.length === 0) {
            tbody.innerHTML = linhaUnica('<span class="text-muted">Nenhum livro cadastrado.</span>');
            return;
        }
        for (const l of cache) {
            const tr = document.createElement('tr');
            tr.innerHTML =
                '<td>' + l.codigo + '</td>' +
                '<td>' + (l.titulo && l.titulo.nome ? l.titulo.nome : '-') + '</td>' +
                '<td>' + (l.autor || '') + '</td>' +
                '<td>' + (l.area || '') + '</td>' +
                '<td>' + (l.exemplarBiblioteca ? 'Sim' : 'Não') + '</td>' +
                '<td class="text-end">' +
                '  <button class="btn btn-sm btn-outline-secondary" onclick="editar(' + l.id + ')">Editar</button> ' +
                '  <button class="btn btn-sm btn-outline-danger" onclick="excluir(' + l.id + ')">Excluir</button>' +
                '</td>';
            tbody.appendChild(tr);
        }
    }

    function abrirNovo() {
        limparForm();
        document.getElementById('form-titulo').textContent = 'Novo livro';
        modal.show();
    }

    function editar(id) {
        const l = cache.find(x => x.id === id);
        if (!l) return;
        document.getElementById('livro-id').value = l.id;
        document.getElementById('codigo').value = l.codigo;
        document.getElementById('tituloNome').value = l.titulo && l.titulo.nome ? l.titulo.nome : '';
        document.getElementById('autor').value = l.autor || '';
        document.getElementById('area').value = l.area || '';
        document.getElementById('prazo').value = l.titulo && l.titulo.prazo ? l.titulo.prazo : '';
        document.getElementById('exemplarBiblioteca').checked = l.exemplarBiblioteca;
        document.getElementById('form-titulo').textContent = 'Editar livro';
        modal.show();
    }

    function limparForm() {
        document.getElementById('livro-id').value = '';
        document.getElementById('codigo').value = '';
        document.getElementById('tituloNome').value = '';
        document.getElementById('autor').value = '';
        document.getElementById('area').value = '';
        document.getElementById('prazo').value = '';
        document.getElementById('exemplarBiblioteca').checked = false;
    }

    async function salvar() {
        const id = document.getElementById('livro-id').value;
        const livro = {
            codigo: parseInt(document.getElementById('codigo').value),
            autor: document.getElementById('autor').value,
            area: document.getElementById('area').value,
            exemplarBiblioteca: document.getElementById('exemplarBiblioteca').checked,
            titulo: {
                nome: document.getElementById('tituloNome').value,
                prazo: parseInt(document.getElementById('prazo').value) || 0
            }
        };

        const url = id ? API + '/' + id : API;
        const metodo = id ? 'PUT' : 'POST';

        const resp = await fetch(url, {
            method: metodo,
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(livro)
        });

        if (resp.ok) {
            modal.hide();
            mostrarAlerta('Livro salvo com sucesso.', 'success');
            carregar();
        } else {
            mostrarAlerta(await extrairErro(resp), 'danger');
        }
    }

    async function excluir(id) {
        if (!confirm('Remover este livro?')) return;
        const resp = await fetch(API + '/' + id, { method: 'DELETE' });
        if (resp.ok) {
            mostrarAlerta('Livro removido.', 'success');
            carregar();
        } else {
            mostrarAlerta(await extrairErro(resp), 'danger');
        }
    }

    async function extrairErro(resp) {
        let msg = 'Não foi possível concluir a operação (status ' + resp.status + ').';
        try {
            const texto = await resp.text();
            if (texto) {
                try {
                    const json = JSON.parse(texto);
                    msg = json.message || json.error || texto;
                } catch (e) {
                    msg = texto;
                }
            }
        } catch (e) { /* mantém a mensagem padrão */ }
        return msg;
    }

    function mostrarAlerta(msg, tipo) {
        document.getElementById('alerta').innerHTML =
            '<div class="alert alert-' + tipo + ' alert-dismissible fade show" role="alert">' +
            msg +
            '<button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Fechar"></button>' +
            '</div>';
        setTimeout(() => {
            const el = document.querySelector('#alerta .alert');
            if (el) bootstrap.Alert.getOrCreateInstance(el).close();
        }, 5000);
    }
</script>
</body>
</html>
